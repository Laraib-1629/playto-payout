<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Playto Pay system architecture</title>
  <desc>Architecture diagram showing React frontend connecting to Django API, PostgreSQL, Redis broker, Celery worker and Celery beat</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1a1a1a; }
      .th { font-size: 14px; font-weight: 500; }
      .ts { font-size: 12px; fill: #555; }
      .arr { stroke: #888; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .box-purple { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
      .box-teal   { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
      .box-blue   { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
      .box-coral  { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
      .box-amber  { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
      .box-gray   { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
      .text-purple { fill: #3C3489; }
      .text-teal   { fill: #085041; }
      .text-blue   { fill: #0C447C; }
      .text-coral  { fill: #712B13; }
      .text-amber  { fill: #633806; }
      .text-gray   { fill: #444441; }
    </style>
  </defs>

  <!-- React Frontend -->
  <rect class="box-purple" x="240" y="30" width="200" height="56" rx="8"/>
  <text class="th text-purple" x="340" y="52" text-anchor="middle" dominant-baseline="central">React frontend</text>
  <text class="ts text-purple" x="340" y="70" text-anchor="middle" dominant-baseline="central">Vite · Tailwind · polling 5s</text>

  <!-- Arrow: Frontend → Django -->
  <line x1="340" y1="86" x2="340" y2="148" class="arr"/>
  <text class="ts" x="356" y="122" dominant-baseline="central">HTTPS · Token auth</text>

  <!-- Django API -->
  <rect class="box-teal" x="200" y="148" width="280" height="56" rx="8"/>
  <text class="th text-teal" x="340" y="170" text-anchor="middle" dominant-baseline="central">Django + DRF</text>
  <text class="ts text-teal" x="340" y="188" text-anchor="middle" dominant-baseline="central">REST API · idempotency · concurrency</text>

  <!-- Arrow: Django → Postgres -->
  <line x1="260" y1="204" x2="160" y2="270" class="arr"/>

  <!-- Arrow: Django → Redis -->
  <line x1="420" y1="204" x2="520" y2="270" class="arr"/>

  <!-- PostgreSQL -->
  <rect class="box-blue" x="40" y="270" width="220" height="56" rx="8"/>
  <text class="th text-blue" x="150" y="292" text-anchor="middle" dominant-baseline="central">PostgreSQL</text>
  <text class="ts text-blue" x="150" y="310" text-anchor="middle" dominant-baseline="central">Ledger · locks · triggers</text>

  <!-- Redis -->
  <rect class="box-coral" x="420" y="270" width="220" height="56" rx="8"/>
  <text class="th text-coral" x="530" y="292" text-anchor="middle" dominant-baseline="central">Redis</text>
  <text class="ts text-coral" x="530" y="310" text-anchor="middle" dominant-baseline="central">Celery broker · task queue</text>

  <!-- Arrow: Redis → Celery Worker -->
  <line x1="490" y1="326" x2="430" y2="390" class="arr"/>

  <!-- Arrow: Redis → Celery Beat -->
  <line x1="570" y1="326" x2="590" y2="390" class="arr"/>

  <!-- Celery Worker -->
  <rect class="box-amber" x="280" y="390" width="220" height="56" rx="8"/>
  <text class="th text-amber" x="390" y="412" text-anchor="middle" dominant-baseline="central">Celery worker</text>
  <text class="ts text-amber" x="390" y="430" text-anchor="middle" dominant-baseline="central">process · retry · reversal</text>

  <!-- Celery Beat -->
  <rect class="box-gray" x="520" y="390" width="140" height="56" rx="8"/>
  <text class="th text-gray" x="590" y="412" text-anchor="middle" dominant-baseline="central">Celery beat</text>
  <text class="ts text-gray" x="590" y="430" text-anchor="middle" dominant-baseline="central">scheduler · 30s</text>

  <!-- Arrow: Celery Worker → Postgres -->
  <path d="M280 418 L150 418 L150 326" class="arr"/>
  <text class="ts" x="55" y="410" dominant-baseline="central">write results</text>

  <!-- Arrow: Celery Beat → Celery Worker -->
  <line x1="520" y1="418" x2="500" y2="418" class="arr"/>

  <!-- Footer -->
  <text class="ts" x="340" y="490" text-anchor="middle" dominant-baseline="central">Railway (backend + workers) · Render (frontend)</text>
</svg>
